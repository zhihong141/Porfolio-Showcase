<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>SEVEN.FOUR.</title>
<style>
* { box-sizing:border-box; }
body { margin:0; background:#0b0b0b; font-family:-apple-system,BlinkMacSystemFont,sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; min-height:-webkit-fill-available; }
.app { width:375px; height:812px; background:#111; border-radius:30px; overflow:hidden; position:relative; }

.splash { position:absolute; inset:0; background:#0b0b0b; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; animation:fadeOut 1s ease 2.2s forwards; }
.splash h1 { color:white; font-size:28px; letter-spacing:3px; margin:0; opacity:0; animation:fadeUp 1s ease forwards; }
.splash p  { color:#888; font-size:12px; margin-top:8px; letter-spacing:2px; opacity:0; animation:fadeUp 1s ease 0.4s forwards; }
@keyframes fadeUp  { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
@keyframes fadeOut { to{opacity:0;pointer-events:none;} }

#mainPane { position:absolute; inset:0; transition:transform .38s cubic-bezier(.3,1,.3,1); }
#mainPane.shifted { transform:translateX(-260px); }

/* Gallery: fixed pixel size, clip overflow */
#gallery { position:absolute; inset:0; overflow:hidden; }
#galleryTrack { display:flex; height:100%; will-change:transform; transition:transform .38s cubic-bezier(.3,1,.3,1); }
/* Page width set by JS to gallery.clientWidth */
.page { flex-shrink:0; height:100%; display:grid; grid-template-columns:repeat(2,1fr); gap:14px; padding:28px 14px 14px; align-content:start; overflow-y:auto; }

#filterBar { position:absolute; top:12px; left:0; right:0; display:flex; justify-content:center; z-index:10; pointer-events:none; opacity:0; transition:opacity .3s; }
#filterBar.visible { opacity:1; pointer-events:all; }
.filterPill { background:rgba(255,255,255,0.15); backdrop-filter:blur(8px); border:0.5px solid rgba(255,255,255,0.25); color:white; font-size:11px; letter-spacing:.5px; padding:4px 12px; border-radius:20px; cursor:pointer; }

.card { border-radius:16px; overflow:hidden; background:#1a1a1a; aspect-ratio:1/1; position:relative; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
.card img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; -webkit-user-drag:none; pointer-events:none; }

.card .badge { position:absolute; bottom:7px; right:7px; height:20px; border-radius:10px; background:rgba(0,0,0,0.55); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; gap:3px; padding:0 7px; pointer-events:none; }
.card .badge svg  { width:9px; height:9px; fill:white; flex-shrink:0; }
.card .badge span { color:white; font-size:10px; font-weight:600; line-height:1; }

.card .tag-chips { position:absolute; bottom:7px; left:7px; display:flex; gap:3px; overflow:hidden; max-width:55%; pointer-events:none; }
.card .tag-chip  { background:rgba(0,0,0,0.55); backdrop-filter:blur(4px); color:rgba(255,255,255,0.8); font-size:9px; padding:2px 6px; border-radius:8px; white-space:nowrap; }



.dots { position:absolute; bottom:80px; left:0; right:0; display:flex; justify-content:center; gap:6px; transition:opacity .4s; pointer-events:none; }
.dot  { width:6px; height:6px; border-radius:50%; background:#666; flex-shrink:0; }
.dot.active { background:#fff; transform:scale(1.4); }

/* Tag panel */
#tagPanel { position:absolute; top:0; right:0; width:260px; height:100%; background:#111; z-index:30; transform:translateX(100%); transition:transform .38s cubic-bezier(.3,1,.3,1); display:flex; flex-direction:column; border-left:1px solid #222; }
#tagPanel.open { transform:translateX(0); }
.tag-panel-header { padding:52px 20px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #222; }
.tag-panel-header h2 { color:#fff; font-size:13px; letter-spacing:2px; margin:0; font-weight:500; }
.tag-panel-close { width:28px; height:28px; border-radius:50%; background:#222; color:#aaa; border:none; font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.tag-list { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:6px; scrollbar-width:none; }
.tag-list::-webkit-scrollbar { display:none; }
.tag-row { display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-radius:10px; cursor:pointer; background:#1a1a1a; border:1px solid #222; -webkit-user-select:none; user-select:none; }
.tag-row.active { background:#1e2a3a; border-color:#2a5080; }
.tag-row-left { display:flex; align-items:center; gap:8px; }
.tag-row-dot  { width:7px; height:7px; border-radius:50%; background:#555; flex-shrink:0; }
.tag-row.active .tag-row-dot  { background:#4a90d9; }
.tag-row-name { color:#ccc; font-size:13px; }
.tag-row.active .tag-row-name { color:#fff; }
.tag-row-count { color:#555; font-size:11px; }
.tag-row.active .tag-row-count { color:#4a90d9; }
.tag-empty { color:#555; font-size:12px; text-align:center; margin-top:40px; line-height:1.8; }
.tag-panel-footer { padding:12px 16px 24px; border-top:1px solid #222; }
.tag-clear-btn { width:100%; padding:11px; border:none; border-radius:10px; background:#222; color:#888; font-size:13px; cursor:pointer; }

/* Viewer */
.viewer { position:absolute; inset:0; z-index:50; background:rgba(0,0,0,0.95); display:flex; flex-direction:column; justify-content:center; align-items:center; opacity:0; pointer-events:none; transform:scale(0.95); transition:opacity .35s ease,transform .35s cubic-bezier(.2,1.2,.3,1); }
.viewer.active { opacity:1; pointer-events:all; transform:scale(1); }
.viewer-media-wrap { width:100%; display:flex; justify-content:center; align-items:center; }

/* Modals */
.inputModal { position:absolute; inset:0; background:rgba(0,0,0,.75); display:none; justify-content:center; align-items:center; z-index:60; }
.inputBox { background:#1a1a1a; padding:20px; border-radius:16px; width:82%; max-height:88%; overflow-y:auto; }
.inputBox input, .inputBox textarea { width:100%; margin-bottom:10px; padding:10px; border-radius:10px; border:none; background:#2a2a2a; color:#fff; font-size:14px; display:block; }

.tag-input-wrap { display:flex; gap:6px; }
.tag-input-wrap input { flex:1; margin-bottom:0; }

.col-thumb-list { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.col-thumb-item { width:58px; height:58px; border-radius:8px; overflow:hidden; position:relative; background:#2a2a2a; flex-shrink:0; }
.col-thumb-item img { width:100%; height:100%; object-fit:cover; display:block; }
.col-thumb-item .rm { position:absolute; top:2px; right:2px; width:15px; height:15px; border-radius:50%; background:rgba(0,0,0,0.7); color:white; font-size:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; }

.actionSheet.show { transform:translateY(0); }

.addBtn { position:absolute; bottom:50px; left:50%; transform:translateX(-50%); width:21px; height:21px; border-radius:50%; background:white; display:flex; justify-content:center; align-items:center; font-size:12px; transition:opacity .4s; box-shadow:0 0 18px rgba(255,255,255,0.35),0 0 30px rgba(255,255,255,0.15); backdrop-filter:blur(6px); z-index:5; cursor:pointer; -webkit-user-select:none; user-select:none; }

#settingsSheet button:last-child { border-bottom:none; }
</style>

<body>
<div class="app">
  <div class="splash"><h1>SEVEN.FOUR.</h1><p>Works of Mine</p></div>

<script>
let works=[], selectedIndex=null, editIndex=null;
let currentViewerIndex=0, currentInnerIndex=0, hideTimer;
let pendingType=null, pendingItems=[], pendingTags=[];
let activeFilterTag=null;
let currentPage=0, totalPages=0;

const gallery   = document.getElementById('gallery');
const track     = document.getElementById('galleryTrack');
const dots      = document.getElementById('dots');
const addBtn    = document.getElementById('addBtn');
const viewer    = document.getElementById('viewer');
const mediaWrap = document.getElementById('viewerMediaWrap');
const vTitle    = document.getElementById('viewerTitle');
const vDesc     = document.getElementById('viewerDesc');
const innerDots = document.getElementById('viewerInnerDots');
const mainPane  = document.getElementById('mainPane');
const tagPanel  = document.getElementById('tagPanel');

/* ── Storage ── */
/* ── IndexedDB storage ──
   Replaces localStorage. IndexedDB can hold hundreds of MB on device
   (browser asks user permission to expand beyond ~50MB on most browsers).
   Each work is stored as its own record by index so reads/writes are fast
   even with large base64 blobs.
   API is async, so saveStorage/loadStorage return Promises.
   All callers use saveStorage().then(()=>...) or await.
*/
let db = null;

function openDB(){
  return new Promise((res,rej)=>{
    if(db){ res(db); return; }
    const req = indexedDB.open('sevenfour', 2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      // Main store: one record = one work item, keyed by auto-increment id
      if(!d.objectStoreNames.contains('works')){
        d.createObjectStore('works', {keyPath:'_id', autoIncrement:true});
      }
      // Migrate from localStorage if first upgrade
      if(e.oldVersion === 0){
        try{
          const old = localStorage.getItem('works');
          if(old){
            const arr = JSON.parse(old);
            const store = e.target.transaction.objectStore('works');
            arr.forEach(w => store.add(w));
            localStorage.removeItem('works'); // free up the old space
          }
        }catch(err){ /* ignore migration errors */ }
      }
    };
    req.onsuccess = e => { db=e.target.result; res(db); };
    req.onerror   = e => { console.error('IDB open error',e); rej(e); };
  });
}

function saveStorage(){
  return openDB().then(d => new Promise((res,rej)=>{
    const tx    = d.transaction('works','readwrite');
    const store = tx.objectStore('works');
    // Clear and rewrite all — simple and consistent
    store.clear().onsuccess = () => {
      works.forEach(w => store.put(w));
    };
    tx.oncomplete = res;
    tx.onerror    = rej;
  })).catch(e=>{ alert('Save failed: '+e); });
}

function loadStorage(){
  return openDB().then(d => new Promise((res,rej)=>{
    const store = d.transaction('works','readonly').objectStore('works');
    const req   = store.getAll();
    req.onsuccess = () => { works = req.result || []; res(); };
    req.onerror   = rej;
  })).catch(()=>{ works=[]; });
}

/* Estimate size of current works in memory */
function estimateSize(){
  try{
    const s = JSON.stringify(works);
    return new Blob([s]).size;
  }catch(e){ return 0; }
}

/* ── Media processing ── */
/* ── Show a processing toast ── */
function showToast(msg){
  let t=document.getElementById('processToast');
  if(!t){
    t=document.createElement('div'); t.id='processToast';
    t.style.cssText='position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);color:white;font-size:11px;letter-spacing:.8px;padding:7px 16px;border-radius:20px;z-index:200;transition:opacity .4s;pointer-events:none;white-space:nowrap;border:0.5px solid rgba(255,255,255,0.15)';
    document.querySelector('.app').appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
}
function hideToast(){
  const t=document.getElementById('processToast');
  if(t) t.style.opacity='0';
}

/* ── Image compression ──
   Max dimension: 1080px (good for phone screens, ~50-70% size reduction on typical shots)
   Quality: 0.75 JPEG — sweet spot between visible quality and file size
   Canvas redraw strips all EXIF metadata automatically
*/
function compressImage(file, cb){
  showToast('COMPRESSING…');
  const img=new Image(), r=new FileReader();
  r.onload=e=>img.src=e.target.result;
  img.onload=()=>{
    const MAX=1080;
    let w=img.width, h=img.height;
    if(w>MAX||h>MAX){ const s=MAX/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
    const c=document.createElement('canvas'), ctx=c.getContext('2d');
    c.width=w; c.height=h;
    ctx.drawImage(img,0,0,w,h);
    hideToast();
    cb(c.toDataURL('image/jpeg',0.75));
  };
  r.readAsDataURL(file);
}

/* ── Video compression ──
   Strategy: use MediaRecorder to re-encode the video at a capped resolution
   and bitrate. Falls back to storing original if MediaRecorder or
   captureStream is unsupported (e.g. older Safari).
   Target: 720p max, 1.5 Mbps video + 128 kbps audio → ~80% size reduction
   on typical phone footage.
*/
function compressVideo(file, cb){
  showToast('COMPRESSING VIDEO…');

  // Build object URL so the video element can stream it without full base64 load
  const objURL = URL.createObjectURL(file);
  const vid = document.createElement('video');
  vid.src = objURL; vid.muted = true; vid.playsInline = true;
  vid.crossOrigin = 'anonymous';

  vid.addEventListener('loadedmetadata', () => {
    // Scale down to max 720p
    const MAX = 720;
    let vw = vid.videoWidth, vh = vid.videoHeight;
    if(vw > MAX || vh > MAX){ const s = MAX / Math.max(vw,vh); vw = Math.round(vw*s); vh = Math.round(vh*s); }

    // Check support
    const canvas = document.createElement('canvas');
    canvas.width = vw; canvas.height = vh;
    const ctx = canvas.getContext('2d');

    const mimeTypes = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
    const mime = mimeTypes.find(m => MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) || null;

    if(!mime || !canvas.captureStream){
      // Fallback: no re-encoding, just extract thumb and store original as base64
      showToast('READING VIDEO…');
      const fr = new FileReader();
      fr.onload = e => { URL.revokeObjectURL(objURL); extractThumb(e.target.result, thumb => { hideToast(); cb(e.target.result, thumb); }); };
      fr.readAsDataURL(file);
      return;
    }

    const stream = canvas.captureStream(30);

    // Try to add audio from the video
    try {
      const actx = new AudioContext();
      const src = actx.createMediaElementSource(vid);
      const dest = actx.createMediaStreamDestination();
      src.connect(dest); src.connect(actx.destination);
      dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));
    } catch(e){ /* audio not available — video only */ }

    const chunks = [];
    const mr = new MediaRecorder(stream, {
      mimeType: mime,
      videoBitsPerSecond: 1_500_000,
      audioBitsPerSecond: 128_000
    });

    mr.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
    mr.onstop = () => {
      URL.revokeObjectURL(objURL);
      const blob = new Blob(chunks, {type: mime.split(';')[0]});
      const fr = new FileReader();
      fr.onload = e => {
        extractThumb(e.target.result, thumb => { hideToast(); cb(e.target.result, thumb); });
      };
      fr.readAsDataURL(blob);
    };

    // Draw each frame to canvas while video plays
    let rafId;
    function drawFrame(){
      if(vid.paused||vid.ended){ mr.stop(); return; }
      ctx.drawImage(vid, 0, 0, vw, vh);
      rafId = requestAnimationFrame(drawFrame);
    }

    mr.start(100); // collect chunks every 100ms
    vid.play().then(()=>{ drawFrame(); });

    // Safety: stop if video ends or stalls
    vid.addEventListener('ended', ()=>{ cancelAnimationFrame(rafId); if(mr.state==='recording') mr.stop(); });
  });

  vid.load();
}

/* Extract first-frame square thumbnail from a base64 video src */
function extractThumb(src, cb){
  const v = document.createElement('video');
  v.src = src; v.muted = true; v.playsInline = true;
  v.addEventListener('loadeddata', ()=> v.currentTime = 0.1);
  v.addEventListener('seeked', ()=>{
    const c = document.createElement('canvas'); c.width=400; c.height=400;
    const ctx = c.getContext('2d'), vw=v.videoWidth, vh=v.videoHeight, side=Math.min(vw,vh);
    ctx.drawImage(v,(vw-side)/2,(vh-side)/2,side,side,0,0,400,400);
    cb(c.toDataURL('image/jpeg',0.75));
  },{once:true});
  v.load();
}

function processVideo(file, cb){
  compressVideo(file, (src, thumb) => cb({type:'video', src, thumb}));
}

function processFile(file, cb){
  if(file.type.startsWith('video/')) processVideo(file, cb);
  else compressImage(file, src => cb({type:'image', src}));
}

/* ── Paging ── */
function PW(){ return gallery.clientWidth || 375; }

function goToPage(p, animate=true){
  totalPages = track.children.length;
  if(totalPages===0){ currentPage=0; return; }
  p = Math.max(0, Math.min(p, totalPages-1));
  currentPage = p;
  track.style.transition = animate ? 'transform .38s cubic-bezier(.3,1,.3,1)' : 'none';
  track.style.transform  = `translateX(${-p * PW()}px)`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===p));
  showUI();
}

/* ── Gallery touch — one page per swipe ── */
let gSx, gSy, gTracking=false, gIntent=null;

gallery.addEventListener('touchstart', e=>{
  if(viewer.classList.contains('active')||tagPanel.classList.contains('open')) return;
  gSx=e.touches[0].clientX; gSy=e.touches[0].clientY;
  gTracking=true; gIntent=null;
  track.style.transition='none';
},{passive:true});

gallery.addEventListener('touchmove', e=>{
  if(!gTracking) return;
  const dx=e.touches[0].clientX-gSx, dy=e.touches[0].clientY-gSy;
  if(gIntent===null && (Math.abs(dx)>6||Math.abs(dy)>6))
    gIntent = Math.abs(dx)>Math.abs(dy) ? 'h' : 'v';
  if(gIntent!=='h') return;
  track.style.transform=`translateX(${-currentPage*PW()+dx}px)`;
},{passive:true});

gallery.addEventListener('touchend', e=>{
  if(!gTracking||gIntent!=='h'){ gTracking=false; gIntent=null; return; }
  gTracking=false;
  const dx=e.changedTouches[0].clientX-gSx;
  const thr=PW()*0.25;
  if     (dx < -thr)                    goToPage(currentPage+1);
  else if(dx >  thr && currentPage===0) { openTagPanel(); goToPage(0,true); }
  else if(dx >  thr)                    goToPage(currentPage-1);
  else                                  goToPage(currentPage);
  gIntent=null;
},{passive:true});

function saveWork(){
  const title=document.getElementById('titleInput').value;
  const desc=document.getElementById('descInput').value;
  const tags=[...pendingTags];
  if(editIndex!==null){
    Object.assign(works[editIndex],{title,desc,tags});
    if(works[editIndex].type==='collection') works[editIndex].items=pendingItems;
    saveStorage().then(()=>{ render(); refreshTagPanel(); });
  } else {
    if(pendingType==='collection'){
      if(!pendingItems.length){ alert('Add at least one item.'); return; }
      works.push({type:'collection',items:pendingItems,title,desc,tags});
    } else {
      const it=pendingItems[0];
      works.push({type:it.type,src:it.src,thumb:it.thumb,title,desc,tags});
    }
    saveStorage().then(()=>{ render(); goToPage(Math.floor((works.length-1)/8),true); refreshTagPanel(); });
  }
  document.getElementById('inputModal').style.display='none';
  pendingItems=[]; pendingTags=[]; pendingType=null; editIndex=null;
}


/* ── Render ── */
function render(){
  track.innerHTML=''; dots.innerHTML='';
  const size=8;
  const vis = activeFilterTag
    ? works.map((w,i)=>({w,i})).filter(({w})=>(w.tags||[]).includes(activeFilterTag))
    : works.map((w,i)=>({w,i}));

  const pw=PW();
  const nPages=Math.ceil(vis.length/size)||0;
  // Show empty state if no works
  if(vis.length===0){
    const empty=document.createElement('div');
    empty.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;pointer-events:none;';
    empty.innerHTML='<div style="width:40px;height:40px;border-radius:50%;border:1px solid #333;display:flex;align-items:center;justify-content:center;"><span style="color:#444;font-size:20px;line-height:1">+</span></div><span style="color:#444;font-size:12px;letter-spacing:1px">'+(activeFilterTag?'NO WORKS WITH THIS TAG':'TAP + TO ADD YOUR FIRST WORK')+'</span>';
    track.appendChild(empty);
  }

  for(let p=0;p<nPages;p++){
    const page=document.createElement('div');
    page.className='page';
    page.style.width=pw+'px';         // ← explicit pixel width, always correct

    vis.slice(p*size,(p+1)*size).forEach(({w:item,i:ri})=>{
      const card=document.createElement('div'); card.className='card';

      if(item.type==='collection'){
        // Use first item as the cover thumbnail
        const first=item.items[0];
        const img=document.createElement('img');
        img.src=first.type==='video'?first.thumb:first.src;
        card.appendChild(img);
        // Collection badge (stacked squares + count)
        const badge=document.createElement('div'); badge.className='badge';
        badge.innerHTML=`<svg viewBox="0 0 10 10"><rect x="0" y="0" width="7" height="7" rx="1" fill="none" stroke="white" stroke-width="1.2"/><rect x="2" y="2" width="7" height="7" rx="1" fill="none" stroke="white" stroke-width="1.2"/></svg><span>${item.items.length}</span>`;
        card.appendChild(badge);
      } else {
        const img=document.createElement('img');
        img.src=item.type==='video'?item.thumb:item.src;
        card.appendChild(img);
        if(item.type==='video'){
          const badge=document.createElement('div'); badge.className='badge';
          badge.innerHTML=`<svg viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg>`;
          card.appendChild(badge);
        }
      }

      if((item.tags||[]).length){
        const chips=document.createElement('div'); chips.className='tag-chips';
        item.tags.slice(0,2).forEach(t=>{
          const c=document.createElement('div'); c.className='tag-chip'; c.textContent=t;
          chips.appendChild(c);
        });
        card.appendChild(chips);
      }

      attachCardGestures(card,ri);
      page.appendChild(card);
    });

    track.appendChild(page);

    const dot=document.createElement('div'); dot.className='dot';
    if(p===0) dot.classList.add('active');
    dots.appendChild(dot);
  }

  // Clamp and reposition without animation
  currentPage = nPages>0 ? Math.min(currentPage,nPages-1) : 0;
  totalPages  = nPages;
  track.style.transition='none';
  track.style.transform=`translateX(${-currentPage*pw}px)`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===currentPage));
}

/* ── Card gestures: double-tap → viewer, long-press → action sheet ── */
function attachCardGestures(card, ri){
  let t0x,t0y,longTimer,didLong=false,lastTap=0,lastX=0,lastY=0;

  card.addEventListener('touchstart',e=>{
    const x=e.touches[0].clientX, y=e.touches[0].clientY, now=Date.now();
    // Prevent browser from stealing second tap on edge cards
    if(now-lastTap<700 && Math.abs(x-lastX)<44 && Math.abs(y-lastY)<44) e.preventDefault();
    t0x=x; t0y=y; didLong=false;
    longTimer=setTimeout(()=>{ didLong=true; selectedIndex=ri; document.getElementById('actionSheet').classList.add('show'); },600);
  },{passive:false});

  card.addEventListener('touchmove',e=>{
    if(Math.abs(e.touches[0].clientX-t0x)>8||Math.abs(e.touches[0].clientY-t0y)>8) clearTimeout(longTimer);
  },{passive:true});

  card.addEventListener('touchend',e=>{
    clearTimeout(longTimer); if(didLong) return;
    const x=e.changedTouches[0].clientX, y=e.changedTouches[0].clientY;
    if(Math.abs(x-t0x)>12||Math.abs(y-t0y)>12){ lastTap=0; return; }
    const now=Date.now();
    if(lastTap>0 && now-lastTap<700 && Math.abs(x-lastX)<44 && Math.abs(y-lastY)<44){
      lastTap=0; openViewer(ri);
    } else { lastTap=now; lastX=x; lastY=y; }
  },{passive:true});

  card.addEventListener('dblclick',()=>{ if(!didLong) openViewer(ri); });
}

/* ── Export backup ──
   Serialises the entire works array (including all base64 image/video data)
   into a JSON file and triggers a download. The file can be saved to
   iCloud Drive, Google Drive, emailed, etc. — anything the OS offers.
*/
function exportBackup(){
  if(!works.length){ alert('Nothing to export yet.'); return; }
  closeSettings();
  showToast('PREPARING EXPORT…');
  setTimeout(()=>{
    const payload = JSON.stringify({ version:1, exported: new Date().toISOString(), works });
    const blob    = new Blob([payload], {type:'application/json'});
    const url     = URL.createObjectURL(blob);
    const a       = document.createElement('a');
    const date    = new Date().toISOString().slice(0,10);
    a.href        = url;
    a.download    = `sevenfour-backup-${date}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    hideToast();
    showToast('EXPORTED ✓');
    setTimeout(hideToast, 2500);
  }, 100);
}

/* ── Import backup ──
   Reads a previously exported JSON file, validates it, merges or replaces works.
*/
function triggerImport(){
  document.getElementById('importFileInput').click();
}

function importBackup(e){
  const file = e.target.files[0]; if(!file) return;
  closeSettings();
  showToast('IMPORTING…');
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(!data.works || !Array.isArray(data.works)) throw new Error('Invalid file');
      // Ask: merge or replace?
      const choice = works.length
        ? confirm(`You have ${works.length} existing work(s).\n\nOK = Replace all with backup\nCancel = Merge backup into existing`)
        : true;
      if(choice){
        works = data.works;
      } else {
        // Merge: append items from backup that don't duplicate by title+type
        const existing = new Set(works.map(w=>w.title+'|'+w.type));
        data.works.forEach(w=>{ if(!existing.has(w.title+'|'+w.type)) works.push(w); });
      }
      saveStorage().then(render);
      hideToast();
      showToast(`IMPORTED ${data.works.length} WORKS ✓`);
      setTimeout(hideToast, 2500);
    } catch(err){
      hideToast();
      alert('Could not read backup file. Make sure it was exported from this app.');
    }
    // Reset input so same file can be re-selected
    e.target.value='';
  };
  r.readAsText(file);
}

/* ── Master compress ── */
async function masterCompress(){
  if(!works.length){ alert('No works to compress.'); return; }
  closeSettings();

  const overlay  = document.getElementById('progressOverlay');
  const label    = document.getElementById('progressLabel');
  const bar      = document.getElementById('progressBar');
  const sub      = document.getElementById('progressSub');
  overlay.style.display='flex';

  const before = estimateSize();
  let done = 0;

  // Flatten all compressible items
  // Each entry: { workIndex, itemIndex|null, type }
  // itemIndex null = single work, itemIndex = collection sub-item
  const tasks = [];
  works.forEach((w,wi)=>{
    if(w.type==='collection'){
      w.items.forEach((it,ii)=> tasks.push({wi,ii,it}));
    } else {
      tasks.push({wi,ii:null,it:w});
    }
  });

  const total = tasks.length;

  function setProgress(n, msg){
    bar.style.width = Math.round((n/total)*100)+'%';
    label.textContent = 'COMPRESSING '+n+' / '+total;
    sub.textContent = msg||'';
  }

  for(const {wi,ii,it} of tasks){
    if(it.type==='image'){
      setProgress(done, 'image…');
      await new Promise(resolve=>{
        recompressImageSrc(it.src, newSrc=>{
          if(ii===null) works[wi].src = newSrc;
          else works[wi].items[ii].src = newSrc;
          resolve();
        });
      });
    } else if(it.type==='video'){
      // For video we recompress the thumb (can't re-encode stored base64 video easily)
      setProgress(done, 'video thumbnail…');
      await new Promise(resolve=>{
        recompressImageSrc(it.thumb, newThumb=>{
          if(ii===null) works[wi].thumb = newThumb;
          else works[wi].items[ii].thumb = newThumb;
          resolve();
        });
      });
    }
    done++;
    setProgress(done, '');
    await tick(); // let UI breathe
  }

  await saveStorage();
  render();

  const after = estimateSize();
  const savedKB = ((before-after)/1024).toFixed(0);
  const savedPct = before>0 ? Math.round((1-after/before)*100) : 0;

  overlay.style.display='none';
  bar.style.width='0%';

  // Show result toast
  showToast(savedPct>0 ? `SAVED ${savedKB} KB (${savedPct}%)` : 'ALREADY OPTIMISED');
  setTimeout(hideToast, 3000);
}

/* Re-compress an already base64 image src through canvas */
function recompressImageSrc(src, cb){
  const img = new Image();
  img.onload = ()=>{
    const MAX=1080;
    let w=img.width, h=img.height;
    if(w>MAX||h>MAX){ const s=MAX/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
    const c=document.createElement('canvas'), ctx=c.getContext('2d');
    c.width=w; c.height=h;
    ctx.drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',0.72));
  };
  img.src = src;
}

function tick(){ return new Promise(r=>setTimeout(r,0)); }

function renderViewer(){
  const work=works[currentViewerIndex];
  const isCol=work.type==='collection';
  const items=isCol?work.items:[work];
  const item=items[currentInnerIndex];
  mediaWrap.innerHTML='';
  if(item.type==='video'){
    const v=document.createElement('video'); v.src=item.src; v.controls=true; v.playsInline=true; v.autoplay=true;
    mediaWrap.appendChild(v);
  } else {
    const img=document.createElement('img'); img.src=item.src; mediaWrap.appendChild(img);
  }
  vTitle.innerText=work.title||'';
  vDesc.innerText=work.desc||'';
  const vtags=document.getElementById('viewerTags'); vtags.innerHTML='';
  (work.tags||[]).forEach(t=>{ const c=document.createElement('div'); c.className='viewer-tag'; c.textContent=t; vtags.appendChild(c); });
  innerDots.innerHTML='';
  if(isCol&&items.length>1) items.forEach((_,i)=>{ const d=document.createElement('div'); d.className='idot'; if(i===currentInnerIndex) d.classList.add('active'); innerDots.appendChild(d); });
  document.getElementById('viewerHint').innerText=isCol&&items.length>1?'swipe image to browse · tap outside to close':'tap outside to close · swipe to navigate';
}

let vt0x,vt0y,vMoved;
viewer.addEventListener('touchstart',e=>{ vt0x=e.touches[0].clientX; vt0y=e.touches[0].clientY; vMoved=false; },{passive:true});
viewer.addEventListener('touchmove', e=>{ if(Math.abs(e.touches[0].clientX-vt0x)>8||Math.abs(e.touches[0].clientY-vt0y)>8) vMoved=true; },{passive:true});
viewer.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-vt0x, dy=e.changedTouches[0].clientY-vt0y;
  const onMedia=mediaWrap===e.target||mediaWrap.contains(e.target);
  const work=works[currentViewerIndex], isCol=work.type==='collection';
  const items=isCol?work.items:[work];
  if(!vMoved){ if(!onMedia) closeViewer(); return; }
  if(onMedia&&items[currentInnerIndex].type==='video') return;
  const ax=Math.abs(dx), ay=Math.abs(dy);
  if(ax>ay&&ax>40){
    if(isCol){
      if(dx>0&&currentInnerIndex>0)                       { currentInnerIndex--; renderViewer(); }
      else if(dx<0&&currentInnerIndex<items.length-1)     { currentInnerIndex++; renderViewer(); }
      else if(dx>0&&currentViewerIndex>0)                 { currentViewerIndex--; currentInnerIndex=0; renderViewer(); }
      else if(dx<0&&currentViewerIndex<works.length-1)    { currentViewerIndex++; currentInnerIndex=0; renderViewer(); }
    } else {
      if(dx>0&&currentViewerIndex>0)                      { currentViewerIndex--; currentInnerIndex=0; renderViewer(); }
      else if(dx<0&&currentViewerIndex<works.length-1)    { currentViewerIndex++; currentInnerIndex=0; renderViewer(); }
    }
  } else if(dy>60&&ay>ax) closeViewer();
},{passive:true});
viewer.addEventListener('click',e=>{ if(e.target===viewer) closeViewer(); });

/* ── UI hide timer ── */
function showUI(){
  dots.classList.remove('hiddenUI'); addBtn.classList.remove('hiddenUI');
  clearTimeout(hideTimer);
  hideTimer=setTimeout(()=>{ dots.classList.add('hiddenUI'); addBtn.classList.add('hiddenUI'); },1200);
}
document.addEventListener('touchstart',showUI,{passive:true});
document.addEventListener('mousemove',showUI);

loadStorage().then(()=>{ render(); showUI(); });
</script>
</body>
